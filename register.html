<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Register - FashionStore</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- FONT -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{
 margin:0;
 padding:0;
 box-sizing:border-box;
 font-family:'Poppins',sans-serif;
}

body{
 overflow:hidden;
}

/* CANVAS */
#bgCanvas{
 position:fixed;
 top:0;
 left:0;
 width:100%;
 height:100%;
 background: radial-gradient(circle,#0f2027,#203a43,#2c5364);
 z-index:-1;
}

/* FORM */
.form-box{
 width:350px;
 padding:30px;
 background:rgba(255,255,255,0.1);
 backdrop-filter:blur(10px);
 border-radius:15px;
 box-shadow:0 10px 30px rgba(0,0,0,0.3);

 position:absolute;
 top:50%;
 left:50%;
 transform:translate(-50%,-50%);

 color:white;
 animation:fadeIn 1s ease;
}

/* INPUT */
.form-box input{
 width:100%;
 padding:10px;
 margin:10px 0;
 border:none;
 border-radius:8px;
 outline:none;
}

/* BUTTON */
.form-box button{
 width:100%;
 padding:10px;
 border:none;
 background:#00c6ff;
 color:white;
 border-radius:8px;
 font-weight:bold;
 transition:0.3s;
}

.form-box button:hover{
 transform:scale(1.05);
 background:#0072ff;
}

/* LINK */
.form-box a{
 color:#ffd700;
 text-decoration:none;
}

/* ANIMASI MASUK */
@keyframes fadeIn{
 from{opacity:0;transform:translate(-50%,-60%)}
 to{opacity:1;transform:translate(-50%,-50%)}
}

/* LOGO REACT */
.logoRN{
 width:30px;
 animation:spin 6s linear infinite;
}

@keyframes spin{
 from{transform:rotate(0deg);}
 to{transform:rotate(360deg);}
}
</style>
</head>

<body>

<!-- BACKGROUND -->
<canvas id="bgCanvas"></canvas>

<!-- FORM -->
<div class="form-box text-center">

<h3 class="mb-3 d-flex align-items-center justify-content-center gap-2">
  Register
 <img src="https://reactnative.dev/img/header_logo.svg" class="logoRN">
</h3>

<input id="regNama" placeholder="Nama Lengkap">
<input id="regHp" placeholder="Nomor HP">
<input id="regPass" type="password" placeholder="Password">

<button onclick="register()">Daftar</button>

<p class="mt-3">
 Sudah punya akun? 
 <a href="login.html">Login</a>
</p>

</div>

<script src="script.js"></script>

<!-- 🔥 BLOCKCHAIN BACKGROUND -->
<script>
const canvas = document.getElementById("bgCanvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let nodes = [];

class Node{
 constructor(){
  this.x = Math.random()*canvas.width;
  this.y = Math.random()*canvas.height;
  this.size = 2 + Math.random()*2;
  this.vx = (Math.random()-0.5)*0.7;
  this.vy = (Math.random()-0.5)*0.7;
 }

 update(){
  this.x += this.vx;
  this.y += this.vy;

  if(this.x < 0 || this.x > canvas.width) this.vx *= -1;
  if(this.y < 0 || this.y > canvas.height) this.vy *= -1;
 }

 draw(){
  ctx.beginPath();
  ctx.arc(this.x,this.y,this.size,0,Math.PI*2);
  ctx.fillStyle = "#00eaff";
  ctx.fill();
 }
}

for(let i=0;i<90;i++){
 nodes.push(new Node());
}

function connect(){
 for(let i=0;i<nodes.length;i++){
  for(let j=i;j<nodes.length;j++){
   let dx = nodes[i].x - nodes[j].x;
   let dy = nodes[i].y - nodes[j].y;
   let dist = Math.sqrt(dx*dx + dy*dy);

   if(dist < 120){
    ctx.beginPath();
    ctx.strokeStyle = "rgba(0,234,255,"+(1 - dist/120)+")";
    ctx.lineWidth = 1;
    ctx.moveTo(nodes[i].x, nodes[i].y);
    ctx.lineTo(nodes[j].x, nodes[j].y);
    ctx.stroke();
   }
  }
 }
}

function animate(){
 ctx.clearRect(0,0,canvas.width,canvas.height);

 nodes.forEach(n=>{
  n.update();
  n.draw();
 });

 connect();

 requestAnimationFrame(animate);
}

animate();

window.addEventListener("resize", ()=>{
 canvas.width = window.innerWidth;
 canvas.height = window.innerHeight;
});
</script>

</body>
</html>
