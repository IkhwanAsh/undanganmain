<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Checkout</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
 background:#f5f5f5;
 font-family:Arial;
}

/* BOX */
.checkout-box{
 max-width:500px;
 margin:40px auto;
 background:white;
 padding:20px;
 border-radius:12px;
 box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

/* PROMO */
.promo-box{
 background: linear-gradient(135deg,#ff4d6d,#ff9a9e);
 color:white;
 padding:15px;
 border-radius:12px;
 margin-bottom:15px;
}

/* BUTTON */
.btn-checkout{
 background:#ff4d6d;
 color:white;
 border:none;
 padding:12px;
 width:100%;
 border-radius:10px;
}

/* QR */
#qrisBox img{
 width:250px;
 border-radius:12px;
 box-shadow:0 5px 15px rgba(0,0,0,0.2);
}
</style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-dark bg-dark px-3">
 <a class="navbar-brand" href="index.html">FashionStore</a>
</nav>

<div class="checkout-box">

<h4 class="mb-3">🧾 Checkout</h4>

<div class="promo-box">
 <b>🔥 Promo Spesial Member!</b>
 <small>10x Checkout Diskon hingga 50%</small>
</div>

<!-- NAMA -->
<div class="mb-3">
 <label>Pesanan Atas Nama</label>
 <input type="text" id="nama" class="form-control" placeholder="Masukkan nama">
</div>

<!-- ALAMAT -->
<div class="mb-3">
 <label>Alamat Pengiriman</label>
 <textarea id="alamat" class="form-control" placeholder="Masukkan alamat lengkap"></textarea>
</div>

<!-- METODE PEMBAYARAN -->
<div class="mb-3">
 <label class="mb-2">Metode Pembayaran</label>

 <select id="pembayaran" class="form-select">
   <option value="">-- Pilih Metode --</option>
   <option value="COD (Bayar di Tempat)">COD (Bayar di Tempat)</option>
   <option value="Transfer Bank BCA">Transfer Bank BCA</option>
   <option value="DANA">DANA</option>
   <option value="QRIS">QRIS (Scan QR)</option>
 </select>
</div>

<!-- INFO PEMBAYARAN -->
<div id="infoPembayaran" class="promo-box" style="display:none;">
 <b>💳 Info Pembayaran</b>
 <p id="detailBayar"></p>
</div>

<!-- QRIS -->
<div id="qrisBox" class="text-center mt-3" style="display:none;">
  <h6>Scan QR untuk pembayaran</h6>

  <!-- GANTI DENGAN GAMBAR KAMU -->
  <img src="qris.jpg">

  <p class="mt-2 text-muted">Gunakan DANA / OVO / GoPay / Mobile Banking</p>
</div>

<!-- TOTAL -->
<div class="mb-3 mt-3">
 <label>Total Belanja</label>
 <input type="text" id="totalCheckout" class="form-control" readonly>
</div>

<!-- BUTTON -->
<button onclick="checkout()" class="btn-checkout">
 🛒 Pesan Sekarang via WhatsApp
</button>

</div>

<!-- SCRIPT -->
<script>

// ======================
// CONFIG WA
// ======================
const ADMIN_WA = "6287874633589";

// ======================
// AUTO ISI DATA
// ======================
document.addEventListener("DOMContentLoaded", () => {
 let user = JSON.parse(localStorage.getItem("login"));
 let cart = JSON.parse(localStorage.getItem("cart")) || [];

 if(user){
  document.getElementById("nama").value = user.nama;
 }

 let total = cart.reduce((a,b)=>a + b.price*b.qty,0);

 document.getElementById("totalCheckout").value =
  "Rp " + total.toLocaleString();
});

// ======================
// PILIH PEMBAYARAN
// ======================
document.getElementById("pembayaran").addEventListener("change", function(){

 let metode = this.value;

 let info = document.getElementById("infoPembayaran");
 let detail = document.getElementById("detailBayar");
 let qris = document.getElementById("qrisBox");

 // reset
 info.style.display = "none";
 qris.style.display = "none";

 if(!metode) return;

 if(metode === "QRIS"){
  qris.style.display = "block";
 }
 else{
  info.style.display = "block";

  if(metode.includes("BCA")){
   detail.innerHTML = "No Rek: 87235671<br>Atas Nama: FashionStore";
  }
  else if(metode === "DANA"){
   detail.innerHTML = "No DANA: 087874633589";
  }
  else{
   detail.innerHTML = "Bayar saat barang sampai (COD)";
  }
 }

});

// ======================
// CHECKOUT WA
// ======================
function checkout(){

 let cart = JSON.parse(localStorage.getItem("cart")) || [];

 let nama = document.getElementById("nama").value;
 let alamat = document.getElementById("alamat").value;
 let pembayaran = document.getElementById("pembayaran").value;

 if(!nama || !alamat || !pembayaran){
  alert("Lengkapi semua data!");
  return;
 }

 if(cart.length === 0){
  alert("Keranjang kosong!");
  return;
 }

 let msg = "Halo, saya ingin pesan:%0A";

 cart.forEach(c=>{
  msg += `- ${c.name} (${c.qty})%0A`;
 });

 let total = cart.reduce((a,b)=>a + b.price*b.qty,0);

 msg += `%0ATotal: Rp ${total.toLocaleString()}%0A`;
 msg += `Nama: ${nama}%0A`;
 msg += `Alamat: ${encodeURIComponent(alamat)}%0A`;
 msg += `Metode Pembayaran: ${pembayaran}%0A`;

 if(pembayaran === "QRIS"){
  msg += "Saya akan bayar via QRIS%0A";
 }

 window.open(`https://wa.me/${ADMIN_WA}?text=${msg}`);
}

</script>

</body>
</html>
