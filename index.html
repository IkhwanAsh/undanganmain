<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Toko Baju Online</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- CSS -->
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-dark bg-dark px-3">
  <a class="navbar-brand" href="#">Three If</a>
  <div>
    <button onclick="goCart()" class="btn btn-warning">Keranjang</button>
    <button id="btnAuth" class="btn btn-light"></button>
  </div>
</nav>

<!-- HERO -->
<header class="hero text-center text-white">
  <h1>Fashion Modern Indonesia</h1>
  <p>Temukan gaya terbaikmu</p>
</header>

<!-- PRODUK -->
<div class="container mt-4">

  <!-- SEARCH + FILTER -->
  <div class="row mb-3">
    <div class="col-md-6">
      <input type="text" id="search" class="form-control" placeholder="Cari produk...">
    </div>
    <div class="col-md-6">
      <select id="filter" class="form-select">
        <option value="all">Semua Kategori</option>
        <option value="pria">Pria</option>
        <option value="wanita">Wanita</option>
        <option value="anak">Anak</option>
      </select>
    </div>
  </div>

  <!-- LIST PRODUK -->
  <div class="row" id="productList"></div>

</div>

<!-- ========================= -->
<!-- 🔥 VIRTUAL TRY ON -->
<!-- ========================= -->
<div class="container mt-5">

  <h3 class="mb-3 text-center">Virtual Try-On (Kamar Pas)</h3>

  <div class="row mb-3">
    
    <!-- UPLOAD -->
    <div class="col-md-4">
      <input type="file" id="uploadFoto" class="form-control">
    </div>

    <!-- PILIH BAJU -->
    <div class="col-md-4">
      <select id="pilihBaju" class="form-select">
        <option value="">Pilih Baju</option>
        <option value="baju1.png">Kaos Oversize</option>
        <option value="dress.jpg">Dress Cantik</option>
        <option value="hoodie pria.jpg">Jaket Hoodie</option>
      </select>
    </div>

    <div class="col-md-4 text-muted">
      Drag baju + scroll untuk resize
    </div>

  </div>

  <!-- AREA TRY ON -->
  <div class="tryon-area">
    <img id="fotoUser">
    <img id="bajuOverlay">
  </div>

</div>

<!-- SCRIPT -->
<script src="script.js"></script>

</body>
</html>
