<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Keranjang Belanja</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

/* RESET */
body{
 margin:0;
 font-family:Arial;
 overflow-x:hidden;
 color:white;
}

/* VIDEO BACKGROUND */
.video-bg{
 position:fixed;
 top:0;
 left:0;
 width:100%;
 height:100%;
 object-fit:cover;
 z-index:-2;
}

/* OVERLAY GELAP */
.overlay{
 position:fixed;
 width:100%;
 height:100%;
 background:linear-gradient(135deg, rgba(0,0,0,0.7), rgba(255,77,109,0.5));
 z-index:-1;
}

/* CONTAINER */
.cart-container {
 max-width:900px;
 margin:40px auto;
}

/* CARD */
.cart-card {
 background:rgba(255,255,255,0.95);
 color:black;
 padding:15px;
 border-radius:15px;
 margin-bottom:15px;
 box-shadow:0 10px 25px rgba(0,0,0,0.3);
 backdrop-filter:blur(6px);
 transition:0.3s;
}

.cart-card:hover{
 transform:translateY(-5px);
}

/* TOTAL BOX */
.total-box{
 background:rgba(255,255,255,0.95);
 color:black;
 padding:20px;
 border-radius:15px;
 box-shadow:0 10px 25px rgba(0,0,0,0.3);
 backdrop-filter:blur(6px);
}

/* BUTTON */
button{
 border:none;
 background:linear-gradient(45deg,#ff4d6d,#ff9a9e);
 color:white;
 padding:6px 12px;
 border-radius:6px;
}

button:hover{
 transform:scale(1.05);
}

/* TITLE */
h3{
 text-shadow:0 3px 10px rgba(0,0,0,0.7);
}

</style>
</head>

<body>

<!-- VIDEO BACKGROUND -->
<video autoplay muted loop class="video-bg">
  <source src="video.mp4" type="video/mp4">
</video>

<!-- OVERLAY -->
<div class="overlay"></div>

<!-- NAVBAR -->
<nav class="navbar navbar-dark bg-dark px-4">
  <a class="navbar-brand fw-bold fs-4 text-white" href="index.html">
    🛍️ FashionStore
  </a>
</nav>

<!-- CONTENT -->
<div class="container cart-container">

<h3 class="mb-4">🛒 Keranjang Belanja</h3>

<div id="cartList"></div>

<div class="total-box mt-4">
  <h4 id="total">Total: Rp 0</h4>

  <a href="checkout.html" class="btn btn-danger w-100 mt-3">
    Checkout Sekarang
  </a>
</div>

</div>

<script src="script.js"></script>

<script>
document.addEventListener("DOMContentLoaded", renderCart);
</script>

</body>
</html>
