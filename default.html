<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pesan di Tengah Hutan</title>
    <style>
        :root {
            --forest-green: #1a2f23;
            --leaf-green: #2d5a27;
            --paper-color: #fdf6e3;
            --text-color: #4a3728;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Georgia', serif;
            background-color: var(--forest-green);
        }

        /* Latar Belakang Hutan */
        .forest-bg {
            position: relative;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(to bottom, #0d1b13 0%, #1a2f23 100%);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Dekorasi Pohon Sederhana */
        .tree {
            position: absolute;
            bottom: 0;
            width: 0;
            height: 0;
            border-left: 50px solid transparent;
            border-right: 50px solid transparent;
            border-bottom: 150px solid rgba(0, 0, 0, 0.3);
            filter: blur(2px);
        }

        /* Animasi Kunang-kunang */
        .firefly {
            position: absolute;
            width: 4px;
            height: 4px;
            background: #f1c40f;
            border-radius: 50%;
            box-shadow: 0 0 10px #f1c40f;
            animation: drift 5s infinite alternate;
        }

        @keyframes drift {
            from { transform: translate(0, 0); opacity: 0.3; }
            to { transform: translate(30px, -50px); opacity: 1; }
        }

        /* Kontainer Surat */
        .envelope-wrapper {
            cursor: pointer;
            z-index: 10;
            transition: transform 0.3s;
        }

        .envelope-wrapper:hover {
            transform: scale(1.1);
        }

        /* Amplop */
        .envelope {
            position: relative;
            width: 150px;
            height: 100px;
            background: #c2a382;
            border-radius: 4px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .envelope::after {
            content: '';
            position: absolute;
            top: 0;
            border-top: 60px solid #d4b494;
            border-left: 75px solid transparent;
            border-right: 75px solid transparent;
            transition: transform 0.5s;
            transform-origin: top;
        }

        /* Surat di Dalam (Hidden) */
        .letter-content {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            width: 80%;
            max-width: 500px;
            height: 60%;
            background: var(--paper-color);
            padding: 40px;
            box-sizing: border-box;
            border-radius: 2px;
            box-shadow: 0 0 100px rgba(0,0,0,0.8);
            z-index: 20;
            color: var(--text-color);
            text-align: center;
            line-height: 1.6;
            transition: all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .letter-content.open {
            display: block;
            transform: translate(-50%, -50%) scale(1);
        }

        .letter-content h2 {
            margin-top: 0;
            color: #8b4513;
        }

        .close-btn {
            margin-top: 20px;
            padding: 8px 20px;
            background: var(--forest-green);
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 20px;
        }

        /* Overlay Gelap saat surat buka */
        .overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 15;
        }

        .overlay.active { display: block; }

    </style>
</head>
<body>

    <div class="forest-bg">
        <div class="tree" style="left: 10%; bottom: 5%;"></div>
        <div class="tree" style="left: 25%; bottom: 2%; transform: scale(1.5);"></div>
        <div class="tree" style="right: 15%; bottom: 8%;"></div>
        <div class="tree" style="right: 5%; bottom: 3%; transform: scale(1.2);"></div>
        
        <div class="firefly" style="top: 20%; left: 30%;"></div>
        <div class="firefly" style="top: 50%; left: 80%; animation-delay: 1s;"></div>
        <div class="firefly" style="top: 70%; left: 10%; animation-delay: 2s;"></div>

        <div class="envelope-wrapper" onclick="openLetter()">
            <div class="envelope"></div>
            <p style="color: #fff; text-align: center; margin-top: 20px; opacity: 0.6; font-size: 14px;">Klik untuk membuka</p>
        </div>
    </div>

    <div class="overlay" id="overlay"></div>

    <div class="letter-content" id="letter">
        <h2>UNTUK PARA PENGHUNI JK</h2>
        <p>NANTI MALEM KALO MAU GAS, GAS AJA TAPI GUA LIAT SIKON DULU, OKE BROW?</p>
        <p>KALO MAU MINUM, AIR ZAM-ZAM AJA BIAR HALAL</p>
        <p><strong>IKAN HIU NABRAK KACA</strong></p>
        <button class="close-btn" onclick="closeLetter()">Tutup</button>
    </div>

    <script>
        function openLetter() {
            document.getElementById('letter').classList.add('open');
            document.getElementById('overlay').classList.add('active');
        }

        function closeLetter() {
            document.getElementById('letter').classList.remove('open');
            document.getElementById('overlay').classList.remove('active');
        }
    </script>
</body>
</html>
