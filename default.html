<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Harta Karun Terakhir - Mobile Optimized</title>
    <link href="https://fonts.googleapis.com/css2?family=Pirata+One&family=Special+Elite&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #ffd700;
            --wood: #3e2723;
            --parchment: #dcb35c;
        }

        body {
            margin: 0;
            height: 100vh;
            background: #0e0705;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: 'Special Elite', cursive;
            touch-action: manipulation; /* Optimasi sentuhan HP */
        }

        /* --- ATMOSFER LAUT --- */
        .ocean-bg {
            position: fixed;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, #1a2a6c, #b21f1f, #fdbb2d);
            opacity: 0.2;
            z-index: -1;
        }

        /* --- CONTAINER UTAMA (RESPONSIF) --- */
        .chest-container {
            position: relative;
            width: 80vw; /* Pakai VW supaya fleksibel di HP */
            max-width: 300px;
            height: 200px;
            cursor: pointer;
            perspective: 1000px;
        }

        .chest-bottom {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 120px;
            background: var(--wood);
            border: 6px solid #21100b;
            border-radius: 0 0 10px 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            z-index: 5;
        }

        .chest-lid {
            position: absolute;
            bottom: 120px;
            width: 100%;
            height: 80px;
            background: var(--wood);
            border: 6px solid #21100b;
            border-radius: 40px 40px 0 0;
            transform-origin: bottom;
            transition: transform 1s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 10;
        }

        .lock {
            position: absolute;
            top: 60px;
            left: 50%;
            transform: translateX(-50%);
            width: 50px;
            height: 50px;
            background: #444;
            border-radius: 50%;
            z-index: 11;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            transition: 0.5s;
        }

        /* --- PETA PERKAMEN (MOBILE FRIENDLY) --- */
        .map {
            position: absolute;
            top: 20px;
            left: 5%;
            width: 90%;
            height: 100px;
            background: var(--parchment);
            background-image: url('https://www.transparenttextures.com/patterns/old-map.png');
            border: 2px solid #5d4037;
            border-radius: 5px;
            z-index: 4;
            transition: all 1.2s cubic-bezier(0.19, 1, 0.22, 1);
            padding: 15px;
            box-sizing: border-box;
            opacity: 0;
            overflow-y: auto; /* Biar teks panjang bisa di-scroll di HP */
        }

        .map-text {
            font-family: 'Pirata One', cursive;
            color: #3e2723;
            font-size: 1rem;
            text-align: center;
            line-height: 1.3;
            opacity: 0;
            transition: opacity 0.8s 1s;
        }

        /* --- STATE TERBUKA --- */
        #chest-toggle { display: none; }

        #chest-toggle:checked + .chest-container .chest-lid {
            transform: rotateX(-110deg);
        }

        #chest-toggle:checked + .chest-container .lock {
            opacity: 0;
            transform: translateX(-50%) translateY(-30px) scale(0);
        }

        #chest-toggle:checked + .chest-container .map {
            opacity: 1;
            transform: translateY(-240px) scale(1.1); /* Skala diperkecil buat HP */
            z-index: 100;
            height: 320px; /* Lebih panjang biar muat teks */
            width: 90vw;
            left: 50%;
            margin-left: -45vw; /* Center alignment */
            border: 10px solid #8d6e63;
            box-shadow: 0 0 50px rgba(0,0,0,0.9);
        }

        #chest-toggle:checked + .chest-container .map-text {
            opacity: 1;
        }

        /* EFEK CAHAYA */
        .glow {
            position: absolute;
            width: 100%;
            height: 40px;
            background: var(--gold);
            filter: blur(30px);
            opacity: 0;
            top: 80px;
            transition: 1s;
        }

        #chest-toggle:checked + .chest-container .glow {
            opacity: 0.5;
            animation: gold-pulse 2s infinite alternate;
        }

        @keyframes gold-pulse {
            from { opacity: 0.3; }
            to { opacity: 0.6; }
        }

        .instruction {
            position: absolute;
            top: 40px;
            width: 90%;
            text-align: center;
            color: var(--gold);
            font-family: 'Pirata One', cursive;
            font-size: 1.5rem;
            letter-spacing: 2px;
            text-shadow: 0 0 10px black;
        }

        .coin {
            position: absolute;
            width: 12px;
            height: 12px;
            background: var(--gold);
            border-radius: 50%;
            pointer-events: none;
            animation: fall 2.5s linear forwards;
            z-index: 200;
        }

        @keyframes fall {
            to { transform: translateY(100vh) rotate(360deg); opacity: 0; }
        }

        /* Responsive khusus layar sangat kecil */
        @media (max-width: 360px) {
            .instruction { font-size: 1.2rem; }
            #chest-toggle:checked + .chest-container .map {
                transform: translateY(-220px) scale(1);
            }
        }
    </style>
</head>
<body>

    <div class="ocean-bg"></div>
    <div class="instruction">KETUK PETI UNTUK PENGHUNI JK</div>

    <input type="checkbox" id="chest-toggle">
    
    <label for="chest-toggle" class="chest-container" onclick="spawnCoins()">
        <div class="glow"></div>
        <div class="chest-lid">
            <div class="lock">💀</div>
        </div>
        
        <div class="map">
            <div class="map-text">
                <span style="font-size: 1.8rem; color: #b21f1f;">X Marks the Spot!</span><br><br>
                UNTUK PENGHUNI JK<br><br>
                "NANTI MALEM YANG MAU GAS, GAS AJA GUA LIAT SIKON, OKE BROW?"<br><br>
                <span style="background: rgba(255, 215, 0, 0.4); padding: 2px 5px;">Ubur-ubur Ikan lele, lanjutin dah.</span><br><br>
                Jadilah kru abadi dalam kapal hidupku? ❤️
            </div>
        </div>

        <div class="chest-bottom">
            <div style="position:absolute; width:15px; height:100%; background:rgba(0,0,0,0.3); left:40px;"></div>
            <div style="position:absolute; width:15px; height:100%; background:rgba(0,0,0,0.3); right:40px;"></div>
        </div>
    </label>

    <script>
        function spawnCoins() {
            // Cek status SEBELUM berubah (karena checkbox baru berubah setelah klik selesai)
            const isChecked = document.getElementById('chest-toggle').checked;
            if(!isChecked) {
                for(let i=0; i<30; i++) {
                    setTimeout(() => {
                        const coin = document.createElement('div');
                        coin.className = 'coin';
                        coin.style.left = Math.random() * 100 + 'vw';
                        coin.style.top = '-20px';
                        coin.style.animationDuration = (Math.random() * 1.5 + 1) + 's';
                        document.body.appendChild(coin);
                        setTimeout(() => coin.remove(), 2500);
                    }, i * 60);
                }
            }
        }
    </script>
</body>
</html>
