<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JK Treasure - Mobile Ready</title>
    <link href="https://fonts.googleapis.com/css2?family=Pirata+One&family=Special+Elite&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #ffd700;
            --wood: #3e2723;
            --parchment: #dcb35c;
        }

        body {
            margin: 0;
            height: 100vh;
            background: #0e0705;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: 'Special Elite', cursive;
            touch-action: manipulation;
        }

        .ocean-bg {
            position: fixed;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, #1a2a6c, #b21f1f, #fdbb2d);
            opacity: 0.15;
            z-index: -1;
        }

        .instruction {
            margin-bottom: 20px;
            color: var(--gold);
            font-family: 'Pirata One', cursive;
            font-size: 1.2rem;
            text-align: center;
            padding: 0 20px;
            text-shadow: 0 0 10px black;
        }

        /* --- CONTAINER PETI (LEBIH KECIL) --- */
        .chest-container {
            position: relative;
            width: 200px; /* Ukuran dasar dikecilkan */
            height: 160px;
            cursor: pointer;
            perspective: 1000px;
        }

        .chest-bottom {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 100px;
            background: var(--wood);
            border: 4px solid #21100b;
            border-radius: 0 0 8px 8px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.8);
            z-index: 5;
        }

        .chest-lid {
            position: absolute;
            bottom: 100px;
            width: 100%;
            height: 60px;
            background: var(--wood);
            border: 4px solid #21100b;
            border-radius: 30px 30px 0 0;
            transform-origin: bottom;
            transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 10;
        }

        .lock {
            position: absolute;
            top: 40px;
            left: 50%;
            transform: translateX(-50%);
            width: 40px;
            height: 40px;
            background: #444;
            border-radius: 50%;
            z-index: 11;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 20px;
            transition: 0.4s;
        }

        /* --- PETA PERKAMEN (AUTO SCALE) --- */
        .map {
            position: absolute;
            bottom: 50px; /* Muncul dari dalam peti */
            left: 50%;
            width: 85vw; /* Lebar fleksibel layar HP */
            max-width: 280px; /* Tidak terlalu besar di tablet */
            height: 0; /* Mulai dari nol */
            background: var(--parchment);
            background-image: url('https://www.transparenttextures.com/patterns/old-map.png');
            border: 0 solid #5d4037;
            border-radius: 5px;
            z-index: 4;
            transition: all 1s ease-in-out;
            padding: 0;
            box-sizing: border-box;
            opacity: 0;
            overflow-y: auto; /* Bisa scroll jika teks panjang */
            transform: translateX(-50%);
        }

        .map-text {
            font-family: 'Pirata One', cursive;
            color: #3e2723;
            font-size: 0.95rem;
            text-align: center;
            line-height: 1.4;
            opacity: 0;
            padding: 15px;
            transition: opacity 0.5s 0.8s;
        }

        /* --- STATE TERBUKA --- */
        #chest-toggle { display: none; }

        #chest-toggle:checked + .chest-container .chest-lid {
            transform: rotateX(-115deg);
        }

        #chest-toggle:checked + .chest-container .lock {
            opacity: 0;
            transform: translateX(-50%) scale(0);
        }

        #chest-toggle:checked + .chest-container .map {
            opacity: 1;
            height: 350px; /* Tinggi peta saat terbuka */
            bottom: 20px; /* Posisi akhir di atas peti */
            padding: 10px;
            border: 8px solid #8d6e63;
            box-shadow: 0 0 40px rgba(0,0,0,0.9);
            z-index: 100;
        }

        #chest-toggle:checked + .chest-container .map-text {
            opacity: 1;
        }

        .glow {
            position: absolute;
            width: 100%;
            height: 30px;
            background: var(--gold);
            filter: blur(25px);
            opacity: 0;
            top: 70px;
            transition: 0.8s;
        }

        #chest-toggle:checked + .chest-container .glow {
            opacity: 0.5;
        }

        .coin {
            position: absolute;
            width: 10px;
            height: 10px;
            background: var(--gold);
            border-radius: 50%;
            pointer-events: none;
            animation: fall 2s linear forwards;
            z-index: 200;
        }

        @keyframes fall {
            to { transform: translateY(100vh) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="ocean-bg"></div>
    <div class="instruction">KETUK PETI NYA, BROW! 🏴‍☠️</div>

    <input type="checkbox" id="chest-toggle">
    
    <label for="chest-toggle" class="chest-container" onclick="spawnCoins()">
        <div class="glow"></div>
        <div class="chest-lid">
            <div class="lock">💀</div>
        </div>
        
        <div class="map">
            <div class="map-text">
                <span style="font-size: 1.5rem; color: #b21f1f;">X Marks the Spot!</span><br><br>
                <strong>UNTUK PENGHUNI JK</strong><br><br>
                "NANTI MALEM YANG MAU GAS, GAS AJA GUA LIAT SIKON, OKE BROW?"<br><br>
                <span style="background: rgba(255, 215, 0, 0.4); padding: 2px 4px;"></span><br><br>
                <br><br>
                <small>(TTD) = TITID</small>
            </div>
        </div>

        <div class="chest-bottom">
            <div style="position:absolute; width:12px; height:100%; background:rgba(0,0,0,0.3); left:30px;"></div>
            <div style="position:absolute; width:12px; height:100%; background:rgba(0,0,0,0.3); right:30px;"></div>
        </div>
    </label>

    <script>
        function spawnCoins() {
            const isChecked = document.getElementById('chest-toggle').checked;
            if(!isChecked) {
                for(let i=0; i<25; i++) {
                    setTimeout(() => {
                        const coin = document.createElement('div');
                        coin.className = 'coin';
                        coin.style.left = Math.random() * 100 + 'vw';
                        coin.style.top = '-10px';
                        document.body.appendChild(coin);
                        setTimeout(() => coin.remove(), 2000);
                    }, i * 70);
                }
            }
        }
    </script>
</body>
</html>
