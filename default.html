<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Harta Karun Terakhir - Pirate Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Pirata+One&family=Special+Elite&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #ffd700;
            --wood: #3e2723;
            --parchment: #dcb35c;
        }

        body {
            margin: 0;
            height: 100vh;
            background: #0e0705;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: 'Special Elite', translateY;
        }

        /* --- ATMOSFER LAUT --- */
        .ocean-bg {
            position: fixed;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, #1a2a6c, #b21f1f, #fdbb2d);
            opacity: 0.2;
            z-index: -1;
        }

        /* --- PETI HARTA KARUN --- */
        .chest-container {
            position: relative;
            width: 300px;
            height: 250px;
            cursor: pointer;
            perspective: 1000px;
        }

        .chest-bottom {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 150px;
            background: var(--wood);
            border: 8px solid #21100b;
            border-radius: 0 0 15px 15px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            z-index: 5;
        }

        .chest-lid {
            position: absolute;
            bottom: 150px;
            width: 100%;
            height: 100px;
            background: var(--wood);
            border: 8px solid #21100b;
            border-radius: 50px 50px 0 0;
            transform-origin: bottom;
            transition: transform 1.2s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 10;
        }

        /* Gembok Tengkorak */
        .lock {
            position: absolute;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 60px;
            background: #444;
            border-radius: 50%;
            z-index: 11;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 30px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            transition: 0.5s;
        }

        /* --- PETA PERKAMEN --- */
        .map {
            position: absolute;
            top: 50px;
            left: 5%;
            width: 90%;
            height: 120px;
            background: var(--parchment);
            background-image: url('https://www.transparenttextures.com/patterns/old-map.png');
            border: 2px solid #5d4037;
            border-radius: 5px;
            z-index: 4;
            transition: all 1.5s cubic-bezier(0.19, 1, 0.22, 1);
            padding: 20px;
            box-sizing: border-box;
            opacity: 0;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        .map-text {
            font-family: 'Pirata One', cursive;
            color: #3e2723;
            font-size: 1.2rem;
            text-align: center;
            line-height: 1.4;
            opacity: 0;
            transition: opacity 1s 1.5s;
        }

        /* --- STATE TERBUKA --- */
        #chest-toggle { display: none; }

        #chest-toggle:checked + .chest-container .chest-lid {
            transform: rotateX(-110deg);
        }

        #chest-toggle:checked + .chest-container .lock {
            opacity: 0;
            transform: translateX(-50%) translateY(-50px) scale(0);
        }

        #chest-toggle:checked + .chest-container .map {
            opacity: 1;
            transform: translateY(-300px) scale(2.8);
            z-index: 100;
            height: 250px;
            border: 15px solid #8d6e63;
            border-image: url('https://www.transparenttextures.com/patterns/dark-leather.png') 30 round;
        }

        #chest-toggle:checked + .chest-container .map-text {
            opacity: 1;
        }

        /* Efek Emas Bercahaya */
        .glow {
            position: absolute;
            width: 100%;
            height: 50px;
            background: var(--gold);
            filter: blur(40px);
            opacity: 0;
            top: 100px;
            transition: 1s;
        }

        #chest-toggle:checked + .chest-container .glow {
            opacity: 0.6;
            animation: gold-pulse 2s infinite alternate;
        }

        @keyframes gold-pulse {
            from { transform: scale(1); opacity: 0.4; }
            to { transform: scale(1.5); opacity: 0.7; }
        }

        .instruction {
            position: absolute;
            top: 20px;
            color: var(--gold);
            font-family: 'Pirata One', cursive;
            font-size: 2rem;
            letter-spacing: 5px;
            text-shadow: 0 0 10px black;
        }

        /* Koin-koin berjatuhan */
        .coin {
            position: absolute;
            width: 15px;
            height: 15px;
            background: var(--gold);
            border-radius: 50%;
            box-shadow: inset 2px 2px 5px rgba(0,0,0,0.5);
            pointer-events: none;
            animation: fall 3s linear forwards;
        }

        @keyframes fall {
            to { transform: translateY(100vh) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="ocean-bg"></div>
    <div class="instruction">SURAT CINTA UNTUK PENGHUNI JK</div>

    <input type="checkbox" id="chest-toggle">
    
    <label for="chest-toggle" class="chest-container" onclick="spawnCoins()">
        <div class="glow"></div>
        <div class="chest-lid">
            <div class="lock">💀</div>
        </div>
        
        <div class="map">
            <div class="map-text" id="mapMessage">
                <span style="font-size: 2rem; color: #b21f1f;">X Marks the Spot!</span><br><br>
                UNTUK PENGHUNI JK<br>
                NANTI MALEM YANG MAU GAS, GAS AJA GUA LIAT SIKON, OKE BROW?<br><br>
                <span style="background: rgba(255, 215, 0, 0.3);">Ubur-ubur Ikan lele, lanjutin dah.</span><br><br>
                Jadilah kru abadi dalam kapal hidupku? ❤️
            </div>
        </div>

        <div class="chest-bottom">
            <div style="position:absolute; width:20px; height:100%; background:rgba(0,0,0,0.3); left:50px;"></div>
            <div style="position:absolute; width:20px; height:100%; background:rgba(0,0,0,0.3); right:50px;"></div>
        </div>
    </label>

    <script>
        function spawnCoins() {
            const isChecked = document.getElementById('chest-toggle').checked;
            if(!isChecked) {
                for(let i=0; i<40; i++) {
                    setTimeout(() => {
                        const coin = document.createElement('div');
                        coin.className = 'coin';
                        coin.style.left = Math.random() * 100 + 'vw';
                        coin.style.top = '-20px';
                        coin.style.animationDuration = (Math.random() * 2 + 1) + 's';
                        document.body.appendChild(coin);
                        setTimeout(() => coin.remove(), 3000);
                    }, i * 50);
                }
            }
        }
    </script>
</body>
</html>
